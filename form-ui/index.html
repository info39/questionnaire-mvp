<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שאלון אפיון UX</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      direction: rtl;
    }

    .wrapper {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
    }

    .form-container {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 32px;
      line-height: 1.2;
    }

    .form-description {
      margin-bottom: 32px;
      color: #555;
      font-size: 16px;
      line-height: 1.6;
    }

    .section {
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid #eee;
    }

    .section:last-of-type {
      border-bottom: none;
    }

    .section h2 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 24px;
    }

    .question {
      margin-bottom: 24px;
    }

    .question > label,
    .question .question-label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 16px;
      line-height: 1.5;
    }

    .required-mark {
      color: #c62828;
      margin-right: 6px;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.5;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    .options-group {
      display: grid;
      gap: 10px;
    }

    .option-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid #e2e2e2;
      border-radius: 10px;
      background: #fafafa;
    }

    .option-item input {
      margin-top: 3px;
    }

    .option-item label {
      margin: 0;
      font-weight: 400;
      cursor: pointer;
      line-height: 1.5;
    }

    .actions {
      margin-top: 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 15px;
      cursor: pointer;
    }

    .primary-btn {
      background: #111;
      color: #fff;
    }

    .secondary-btn {
      background: #ececec;
      color: #111;
    }

    .message {
      margin-top: 20px;
      font-size: 14px;
      color: #2e7d32;
      display: none;
    }

    .error {
      margin-top: 20px;
      font-size: 14px;
      color: #c62828;
      display: none;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="form-container">
      <h1 id="form-title"></h1>
      <div id="form-description" class="form-description"></div>
      <div id="form"></div>

      <div class="actions">
        <button class="primary-btn" onclick="submitForm()">שלח לבדיקה</button>
        <button class="secondary-btn" onclick="downloadJson()">הורד JSON של תשובות</button>
      </div>

      <div id="success-message" class="message">הטופס נאסף לבדיקה.</div>
      <div id="error-message" class="error"></div>
    </div>
  </div>

  <script src="form.js"></script>
</body>
</html>
