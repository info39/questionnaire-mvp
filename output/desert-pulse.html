<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Pulse — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Anthropic Brand Colors */
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 13px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .status-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(120, 140, 93, 0.12);
            color: var(--anthropic-green);
            margin-top: 6px;
        }

        /* Control Sections */
        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        /* Seed Controls */
        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
            color: var(--anthropic-dark);
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        /* Parameter Controls */
        .control-group { margin-bottom: 20px; }

        .control-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 36px;
            text-align: right;
        }

        /* Color Pickers */
        .color-group { margin-bottom: 16px; }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 6px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        /* Buttons */
        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active { transform: translateY(0); }

        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }

        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }

        .button-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .button-row .button { flex: 1; }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.12);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
            font-size: 15px;
            color: var(--anthropic-mid-gray);
            font-family: 'Poppins', sans-serif;
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h1>Desert Pulse</h1>
        <div class="subtitle">
            Aeolian drift — desert wind made visible through accumulation.<br>
            <span class="status-badge" id="status-badge">Rendering…</span>
        </div>

        <!-- Seed Section (FIXED) -->
        <div class="control-section">
            <h3>Seed</h3>
            <input type="number" id="seed-input" class="seed-input" value="42195" onchange="updateSeed()">
            <div class="seed-controls">
                <button class="button secondary" onclick="previousSeed()">← Prev</button>
                <button class="button secondary" onclick="nextSeed()">Next →</button>
            </div>
            <button class="button tertiary" onclick="randomSeedAndUpdate()" style="margin-bottom:0">↻ Random</button>
        </div>

        <!-- Parameters Section -->
        <div class="control-section">
            <h3>Parameters</h3>

            <div class="control-group">
                <label>Grain Density</label>
                <div class="slider-container">
                    <input type="range" id="grainCount" min="500" max="6000" step="100" value="3000"
                           oninput="updateParam('grainCount', this.value)">
                    <span class="value-display" id="grainCount-value">3000</span>
                </div>
            </div>

            <div class="control-group">
                <label>Wind Strength</label>
                <div class="slider-container">
                    <input type="range" id="windStrength" min="0.2" max="2.5" step="0.1" value="1.0"
                           oninput="updateParam('windStrength', this.value)">
                    <span class="value-display" id="windStrength-value">1.0</span>
                </div>
            </div>

            <div class="control-group">
                <label>Ripple Density</label>
                <div class="slider-container">
                    <input type="range" id="rippleDensity" min="1" max="12" step="1" value="5"
                           oninput="updateParam('rippleDensity', this.value)">
                    <span class="value-display" id="rippleDensity-value">5</span>
                </div>
            </div>

            <div class="control-group">
                <label>Drift Speed</label>
                <div class="slider-container">
                    <input type="range" id="driftSpeed" min="0.1" max="1.5" step="0.1" value="0.4"
                           oninput="updateParam('driftSpeed', this.value)">
                    <span class="value-display" id="driftSpeed-value">0.4</span>
                </div>
            </div>

            <div class="control-group">
                <label>Grain Size</label>
                <div class="slider-container">
                    <input type="range" id="grainSize" min="0.2" max="2.5" step="0.1" value="0.9"
                           oninput="updateParam('grainSize', this.value)">
                    <span class="value-display" id="grainSize-value">0.9</span>
                </div>
            </div>
        </div>

        <!-- Colors Section -->
        <div class="control-section">
            <h3>Colors</h3>

            <div class="color-group">
                <label>Sand Light</label>
                <div class="color-picker-container">
                    <input type="color" id="colorLight" value="#d4b896"
                           onchange="updateGrainColor(0, this.value)">
                    <span class="color-value" id="colorLight-value">#d4b896</span>
                </div>
            </div>

            <div class="color-group">
                <label>Sand Mid</label>
                <div class="color-picker-container">
                    <input type="color" id="colorMid" value="#b89870"
                           onchange="updateGrainColor(1, this.value)">
                    <span class="color-value" id="colorMid-value">#b89870</span>
                </div>
            </div>

            <div class="color-group">
                <label>Ochre / Shadow</label>
                <div class="color-picker-container">
                    <input type="color" id="colorShadow" value="#9a7a52"
                           onchange="updateGrainColor(2, this.value)">
                    <span class="color-value" id="colorShadow-value">#9a7a52</span>
                </div>
            </div>
        </div>

        <!-- Actions Section (FIXED) -->
        <div class="control-section">
            <h3>Actions</h3>
            <div class="button-row">
                <button class="button" onclick="initializeSystem()">↺ Regenerate</button>
                <button class="button secondary" onclick="resetParameters()">Reset</button>
            </div>
            <button class="button tertiary" onclick="downloadPNG()">↓ Save PNG</button>
        </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-area">
        <div id="canvas-container">
            <div class="loading">Initializing Desert Pulse…</div>
        </div>
    </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// DESERT PULSE — Parameters
// ═══════════════════════════════════════════════════════════════════════

let params = {
    seed:         42195,
    grainCount:   3000,
    windStrength: 1.0,
    rippleDensity: 5,
    driftSpeed:   0.4,
    grainSize:    0.9,
};

const defaultParams = Object.assign({}, params);

const BG = [244, 237, 224];

// Desert strata — 5 tonal layers; first 3 are user-adjustable
let GRAIN_COLS = [
    [212, 184, 150, 30],
    [184, 152, 112, 25],
    [154, 122, 82,  22],
    [200, 168, 122, 28],
    [232, 216, 188, 38],
];

function hexToRgb(hex) {
    let r = parseInt(hex.slice(1,3), 16);
    let g = parseInt(hex.slice(3,5), 16);
    let b = parseInt(hex.slice(5,7), 16);
    return [r, g, b];
}

// ═══════════════════════════════════════════════════════════════════════
// P5.JS SKETCH
// ═══════════════════════════════════════════════════════════════════════

let grains = [];
let t = 0;
const MAX_FRAMES = 900;
let running = true;
let p5Instance;

function setup() {
    let canvas = createCanvas(1200, 1200);
    canvas.parent('canvas-container');
    let loadEl = document.querySelector('.loading');
    if (loadEl) loadEl.style.display = 'none';
    initializeSystem();
}

function initializeSystem() {
    randomSeed(params.seed);
    noiseSeed(params.seed);

    background(BG[0], BG[1], BG[2]);

    // Fine dust texture — compacted sand surface
    noStroke();
    for (let i = 0; i < 14000; i++) {
        let x = random(width);
        let y = random(height);
        fill(
            random(175, 218),
            random(152, 190),
            random(115, 160),
            random(3, 13)
        );
        ellipse(x, y, random(0.3, 1.8), random(0.3, 1.8));
    }

    grains = [];
    for (let i = 0; i < params.grainCount; i++) {
        grains.push(new Grain(true));
    }

    t = 0;
    running = true;
    setBadge('Rendering…', '#788c5d');
    loop();
}

// ─── Flow Field ────────────────────────────────────────────────────────

function flowAngle(x, y, time) {
    let scale  = params.rippleDensity * 0.001;
    let tScale = params.driftSpeed * 0.001;

    let primary   = noise(x * scale * 0.45, y * scale * 0.45,   time * tScale)       * TWO_PI * 2.0;
    let secondary = noise(x * scale * 1.9 + 100, y * scale * 1.9 + 100, time * tScale * 1.6) * PI;

    let angle = primary * 0.62 + secondary * 0.38;
    let bias  = 0.12 + noise(x * scale * 0.28, y * scale * 0.28, time * tScale * 0.5) * 0.72;
    return lerp(angle, bias, 0.22);
}

// ─── Draw Loop ─────────────────────────────────────────────────────────

function draw() {
    if (!running) return;
    t++;

    // The Pulse — slow sinusoidal breath modulating wind intensity
    let pulse = 0.68 + 0.32 * sin(t * 0.0075);

    for (let g of grains) {
        g.update(pulse);
        g.render();
    }

    if (t >= MAX_FRAMES) {
        running = false;
        noLoop();
        setBadge('Complete', '#d97757');
    }
}

// ─── Sand Grain ────────────────────────────────────────────────────────

class Grain {
    constructor(scattered) {
        this.init(scattered);
    }

    init(scattered) {
        if (scattered || random() < 0.55) {
            this.x = random(width);
            this.y = random(height);
        } else {
            let edge = floor(random(4));
            if      (edge === 0) { this.x = random(width); this.y = -2; }
            else if (edge === 1) { this.x = width + 2;     this.y = random(height); }
            else if (edge === 2) { this.x = random(width); this.y = height + 2; }
            else                 { this.x = -2;            this.y = random(height); }
        }

        this.px = this.x;
        this.py = this.y;

        this.maxLife = random(55, 240);
        this.life    = scattered ? random(this.maxLife) : 0;
        this.speed   = random(0.45, 2.1) * params.windStrength;

        let ci = floor(random(GRAIN_COLS.length));
        let c  = GRAIN_COLS[ci];
        this.r = c[0];
        this.g = c[1];
        this.b = c[2];
        this.baseAlpha = c[3];
        this.weight = random(0.28, 1.7) * params.grainSize;
    }

    update(pulse) {
        this.px = this.x;
        this.py = this.y;

        let angle = flowAngle(this.x, this.y, t);
        let spd   = this.speed * pulse;

        this.x += cos(angle) * spd;
        this.y += sin(angle) * spd * 0.52;

        this.life++;

        if (
            this.life >= this.maxLife ||
            this.x < -6 || this.x > width + 6 ||
            this.y < -6 || this.y > height + 6
        ) {
            this.init(false);
        }
    }

    render() {
        let fade  = sin((this.life / this.maxLife) * Math.PI);
        let alpha = this.baseAlpha * fade;
        stroke(this.r, this.g, this.b, alpha);
        strokeWeight(this.weight);
        line(this.px, this.py, this.x, this.y);
    }
}

// ═══════════════════════════════════════════════════════════════════════
// UI CONTROL HANDLERS
// ═══════════════════════════════════════════════════════════════════════

function updateParam(name, value) {
    let v = parseFloat(value);
    if (name === 'grainCount') v = parseInt(value);
    params[name] = v;
    document.getElementById(name + '-value').textContent = v;
    initializeSystem();
}

function updateGrainColor(index, hex) {
    let rgb = hexToRgb(hex);
    GRAIN_COLS[index][0] = rgb[0];
    GRAIN_COLS[index][1] = rgb[1];
    GRAIN_COLS[index][2] = rgb[2];
    let labels = ['colorLight', 'colorMid', 'colorShadow'];
    document.getElementById(labels[index] + '-value').textContent = hex;
    initializeSystem();
}

// ═══════════════════════════════════════════════════════════════════════
// SEED CONTROL FUNCTIONS (FIXED)
// ═══════════════════════════════════════════════════════════════════════

function updateSeedDisplay() {
    document.getElementById('seed-input').value = params.seed;
}

function updateSeed() {
    let v = parseInt(document.getElementById('seed-input').value);
    if (v && v > 0) {
        params.seed = v;
        initializeSystem();
    } else {
        updateSeedDisplay();
    }
}

function previousSeed() {
    params.seed = Math.max(1, params.seed - 1);
    updateSeedDisplay();
    initializeSystem();
}

function nextSeed() {
    params.seed = params.seed + 1;
    updateSeedDisplay();
    initializeSystem();
}

function randomSeedAndUpdate() {
    params.seed = Math.floor(Math.random() * 999999) + 1;
    updateSeedDisplay();
    initializeSystem();
}

function resetParameters() {
    Object.assign(params, defaultParams);

    // Reset sliders
    ['grainCount','windStrength','rippleDensity','driftSpeed','grainSize'].forEach(k => {
        let el = document.getElementById(k);
        if (el) {
            el.value = params[k];
            document.getElementById(k + '-value').textContent = params[k];
        }
    });

    // Reset colors
    GRAIN_COLS[0] = [212, 184, 150, 30];
    GRAIN_COLS[1] = [184, 152, 112, 25];
    GRAIN_COLS[2] = [154, 122,  82, 22];
    document.getElementById('colorLight').value  = '#d4b896';
    document.getElementById('colorLight-value').textContent  = '#d4b896';
    document.getElementById('colorMid').value    = '#b89870';
    document.getElementById('colorMid-value').textContent    = '#b89870';
    document.getElementById('colorShadow').value = '#9a7a52';
    document.getElementById('colorShadow-value').textContent = '#9a7a52';

    updateSeedDisplay();
    initializeSystem();
}

function downloadPNG() {
    saveCanvas('desert-pulse-seed-' + params.seed, 'png');
}

// ─── Status badge helper ────────────────────────────────────────────────

function setBadge(text, color) {
    let badge = document.getElementById('status-badge');
    if (badge) {
        badge.textContent = text;
        badge.style.color = color;
        badge.style.background = color + '22';
    }
}

window.addEventListener('load', function () {
    updateSeedDisplay();
});
</script>
</body>
</html>
